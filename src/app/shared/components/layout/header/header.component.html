<header class="header">
  <div class="container">
    <div class="nav-brand">
      <a class="brand-link" routerLink="/" aria-label="Prospera">
  <img src="assets/images/prospera-logo3.png" alt="Prospera" title="Prospera" class="site-logo" width="220" height="48" decoding="async" loading="lazy" />
      </a>
    </div>
    <nav class="nav-menu" aria-label="Navegação principal">
      <a
        *ngFor="let item of navItems; trackBy: trackByLabel"
        class="nav-link"
        routerLink="{{ item.route }}"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? true }"
      >
        {{ item.label }}
      </a>
    </nav>
    <div class="nav-actions" *ngIf="showAccount">
      <ng-container *ngIf="!isAuthenticated; else accountMenu">
        <button type="button" class="btn-icon" (click)="accountClick.emit()" aria-label="Entrar na plataforma">
          <svg class="icon-user-outline" viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 19c0-3.3 3.1-6 8-6s8 2.7 8 6" />
          </svg>
          <span class="enter-label">Entrar</span>
        </button>
      </ng-container>
      <ng-template #accountMenu>
        <div class="account-actions">
          <div class="account-menu-wrapper">
            <button 
              type="button" 
              class="btn-icon account-menu-trigger"
              (click)="toggleMenu()"
              [attr.aria-expanded]="isMenuOpen()"
              aria-haspopup="true"
              aria-label="Abrir menu da conta">
              <svg class="icon-user-outline" viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 19c0-3.3 3.1-6 8-6s8 2.7 8 6" />
              </svg>
              <span>{{ userLabel || 'Minha conta' }}</span>
            </button>

            <!-- Dropdown Menu -->
            <nav 
              class="account-dropdown"
              *ngIf="isMenuOpen()"
              aria-label="Menu da conta"
              role="navigation">
              <div class="dropdown-user-info">
                <p class="user-name">{{ userLabel }}</p>
                <p class="user-email">{{ userEmail }}</p>
                <span class="profile-status" *ngIf="isProfileComplete">
                  <i class="fas fa-check-circle"></i>
                  Perfil Completo
                </span>
              </div>

              <div class="dropdown-divider"></div>

              <button 
                type="button"
                *ngFor="let item of accountMenuItems"
                (click)="selectMenuItem(item.id)"
                class="dropdown-menu-item"
                role="menuitem">
                <i [class]="item.icon" aria-hidden="true"></i>
                <span>{{ item.label }}</span>
              </button>

              <div class="dropdown-divider"></div>

              <button 
                type="button"
                (click)="doLogout()"
                class="dropdown-menu-item logout-item"
                role="menuitem">
                <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
                <span>Sair</span>
              </button>
            </nav>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</header>
