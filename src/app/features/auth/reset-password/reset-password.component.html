<section class="auth-page">
  <div class="container auth-container">
    <div class="auth-card">
      <header class="auth-header">
        <h1>Redefinir Senha</h1>
        <p class="intro-sub">Digite sua nova senha para recuperar o acesso.</p>
      </header>

      <!-- Estado: Token Inválido/Expirado -->
      <div class="invalid-state" *ngIf="tokenInvalid && !isSuccess">
        <div class="error-icon">
          <i class="fas fa-exclamation-circle"></i>
        </div>
        <h2>Link Inválido ou Expirado</h2>
        <p>{{ errorMessage }}</p>
        <button type="button" class="btn btn-primary" (click)="goBackToLogin()">
          Voltar ao Login
        </button>
      </div>

      <!-- Estado: Formulário de Reset -->
      <form
        *ngIf="!tokenInvalid && !isSuccess"
        [formGroup]="resetForm"
        (ngSubmit)="submitResetPassword()"
        class="auth-form"
        aria-label="Formulário de redefinição de senha"
      >
        <!-- Mensagens -->
        <div class="auth-messages" *ngIf="errorMessage">
          <p class="error">{{ errorMessage }}</p>
        </div>

        <!-- Campo: Nova Senha -->
        <label class="auth-field">
          <span>Nova Senha</span>
          <input
            type="password"
            formControlName="newPassword"
            autocomplete="new-password"
            placeholder="Mínimo 8 caracteres"
            required
          />
          <small class="field-error" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
            <span *ngIf="resetForm.get('newPassword')?.hasError('required')">A senha é obrigatória.</span>
            <span *ngIf="resetForm.get('newPassword')?.hasError('minlength')">A senha deve ter no mínimo 8 caracteres.</span>
          </small>
        </label>

        <!-- Campo: Confirmar Senha -->
        <label class="auth-field">
          <span>Confirmar Nova Senha</span>
          <input
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            placeholder="Repita sua nova senha"
            required
          />
          <small class="field-error" *ngIf="getPasswordMatchError()">
            As senhas não correspondem.
          </small>
          <small class="field-error" *ngIf="resetForm.get('confirmPassword')?.invalid && resetForm.get('confirmPassword')?.touched && !getPasswordMatchError()">
            Confirme sua senha.
          </small>
        </label>

        <!-- Botão: Salvar -->
        <button class="btn btn-primary" type="submit" [disabled]="isLoading || resetForm.invalid">
          <span *ngIf="isLoading" class="spinner"></span>
          {{ isLoading ? 'Salvando…' : 'Salvar Nova Senha' }}
        </button>
      </form>

      <!-- Estado: Sucesso -->
      <div class="success-state" *ngIf="isSuccess">
        <div class="success-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h2>Senha Redefinida!</h2>
        <p>{{ successMessage }}</p>
        <button type="button" class="btn btn-primary" (click)="goBackToLogin()">
          Ir para Login
        </button>
      </div>
    </div>
  </div>
</section>
