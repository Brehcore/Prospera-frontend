<section class="auth-page">
  <div class="container auth-container">
    <div class="auth-card">
      <header class="auth-header">
        <h1>Bem-vindo</h1>
        <p class="intro-sub" *ngIf="activeTab !== 'forgot-password'">Acesse ou crie sua conta.</p>
        <p class="intro-sub" *ngIf="activeTab === 'forgot-password'">Informe o e-mail da sua conta para receber um link de recuperação.</p>
      </header>

      <div class="auth-tabs" role="tablist">
        <button
          type="button"
          class="auth-tab"
          [class.active]="activeTab === 'login'"
          role="tab"
          [attr.aria-selected]="activeTab === 'login'"
          (click)="selectTab('login')"
        >
          Entrar
        </button>
        <button
          type="button"
          class="auth-tab"
          [class.active]="activeTab === 'register'"
          role="tab"
          [attr.aria-selected]="activeTab === 'register'"
          (click)="selectTab('register')"
        >
          Criar conta
        </button>
        <button
          type="button"
          class="auth-tab"
          [class.active]="activeTab === 'forgot-password'"
          role="tab"
          [attr.aria-selected]="activeTab === 'forgot-password'"
          (click)="selectTab('forgot-password')"
        >
          Recuperar
        </button>
      </div>

      <div class="auth-messages" *ngIf="errorMessage || successMessage">
        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
        <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
      </div>

      <!-- FORM: Login -->
      <form
        *ngIf="activeTab === 'login'"
        [formGroup]="loginForm"
        (ngSubmit)="submitLogin()"
        class="auth-form"
        aria-label="Formulário de login"
      >
        <label class="auth-field">
          <span>E-mail</span>
          <input type="email" formControlName="email" autocomplete="email" required />
          <small class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            Informe um e-mail válido.
          </small>
        </label>

        <label class="auth-field">
          <span>Senha</span>
          <input type="password" formControlName="password" autocomplete="current-password" required />
          <small class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            A senha precisa ter ao menos 6 caracteres.
          </small>
        </label>

        <div class="auth-field-helper">
          <button type="button" class="btn-forgot-password" (click)="selectTab('forgot-password')">
            <i class="fas fa-key"></i> Esqueci minha senha
          </button>
        </div>

        <button class="btn btn-primary" type="submit" [disabled]="isLoading">
          {{ isLoading ? 'Entrando…' : 'Entrar' }}
        </button>
      </form>

      <!-- FORM: Register -->
      <form
        *ngIf="activeTab === 'register'"
        [formGroup]="registerForm"
        (ngSubmit)="submitRegister()"
        class="auth-form"
        aria-label="Formulário de cadastro"
      >
        <label class="auth-field">
          <span>E-mail</span>
          <input type="email" formControlName="email" autocomplete="email" required />
          <small class="field-error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
            Informe um e-mail válido.
          </small>
        </label>

        <label class="auth-field">
          <span>Senha</span>
          <input type="password" formControlName="password" autocomplete="new-password" required />
          <small class="field-error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
            A senha precisa ter ao menos 6 caracteres.
          </small>
        </label>

        <button class="btn btn-primary" type="submit" [disabled]="isLoading">
          {{ isLoading ? 'Criando conta…' : 'Cadastrar' }}
        </button>
      </form>

      <!-- FORM: Forgot Password -->
      <div *ngIf="activeTab === 'forgot-password'">
        <form
          *ngIf="!forgotPasswordSuccess"
          [formGroup]="forgotPasswordForm"
          (ngSubmit)="submitForgotPassword()"
          class="auth-form"
          aria-label="Formulário de recuperação de senha"
        >
          <label class="auth-field">
            <span>E-mail</span>
            <input
              type="email"
              formControlName="email"
              autocomplete="email"
              placeholder="Digite seu e-mail"
              required
            />
            <small
              class="field-error"
              *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched"
            >
              Informe um e-mail válido.
            </small>
          </label>

          <button class="btn btn-primary" type="submit" [disabled]="isLoading">
            <span *ngIf="isLoading" class="spinner"></span>
            {{ isLoading ? 'Enviando…' : 'Enviar Link de Recuperação' }}
          </button>
        </form>

        <div class="forgot-password-success" *ngIf="forgotPasswordSuccess">
          <div class="success-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <h2>Link enviado!</h2>
          <p>{{ successMessage }}</p>
          <button type="button" class="btn btn-secondary" (click)="resetForgotPasswordForm()">
            Tentar com outro e-mail
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
