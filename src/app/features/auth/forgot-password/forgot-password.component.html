<section class="auth-page">
  <div class="container auth-container">
    <div class="auth-card">
      <header class="auth-header">
        <h1>Recuperar Senha</h1>
        <p class="intro-sub">Informe o e-mail da sua conta para receber um link de recuperação.</p>
      </header>

      <div class="auth-messages" *ngIf="successMessage || errorMessage">
        <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      </div>

      <form
        *ngIf="!isSubmitted"
        [formGroup]="forgotPasswordForm"
        (ngSubmit)="submitForgotPassword()"
        class="auth-form"
        aria-label="Formulário de recuperação de senha"
      >
        <label class="auth-field">
          <span>E-mail</span>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="Digite seu e-mail"
            required
          />
          <small
            class="field-error"
            *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched"
          >
            Informe um e-mail válido.
          </small>
        </label>

        <button class="btn btn-primary" type="submit" [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner"></span>
          {{ isLoading ? 'Enviando…' : 'Enviar Link de Recuperação' }}
        </button>
      </form>

      <div class="success-state" *ngIf="isSubmitted">
        <div class="success-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h2>Link enviado!</h2>
        <p>{{ successMessage }}</p>
        <button class="btn btn-secondary" (click)="resetForm()">
          Tentar com outro e-mail
        </button>
      </div>

      <div class="auth-footer">
        <button type="button" class="btn-link" (click)="goBackToLogin()">
          ← Voltar ao Login
        </button>
      </div>
    </div>
  </div>
</section>
