<section class="policies-hero">
  <div class="hero-content">
    <h1>Políticas e LGPD</h1>
    <p>Transparência no uso de dados, direitos dos titulares e compromisso com a segurança da informação.</p>
  </div>
</section>

<section class="policies-content">
  <div class="container">
    <div class="policies-grid">
      <ng-container *ngFor="let section of sections">
        <!-- Mostrar políticas principais sempre expandidas -->
        <article class="policy-card" *ngIf="isStaticSection(section.title); else collapsible">
          <h2>{{ section.title }}</h2>
          <div class="policy-body">
            <p *ngFor="let paragraph of section.paragraphs">{{ paragraph }}</p>
          </div>
        </article>

        <ng-template #collapsible>
          <details class="policy-card">
            <summary class="policy-summary">
              <h2>{{ section.title }}</h2>
              <span class="chev" aria-hidden="true">▾</span>
            </summary>
            <div class="policy-body">
              <p *ngFor="let paragraph of section.paragraphs">{{ paragraph }}</p>
            </div>
          </details>
        </ng-template>
      </ng-container>
    </div>
  </div>
</section>
